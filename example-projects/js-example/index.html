<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tightset — JS Example</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #0a0a0a; font-family: Inter, sans-serif; color: #fff; padding: 2rem; gap: 2rem; }
    .header { display: flex; align-items: center; gap: 0.75rem; }
    .header .sep { font-size: 1.5rem; font-weight: 300; color: #555; }
    .header h1 { font-weight: 300; color: #666; margin: 0; }
    input { width: 400px; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
    canvas { border-radius: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 400 400" width="40" height="40"><rect x="16" y="16" width="368" height="368" rx="32" fill="#0a0a0a" stroke="#333" stroke-width="2"/><text x="200" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="107" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">TIGHT</text><text x="200" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="172" font-weight="900" fill="#ffffff" letter-spacing="-0.03em">SET</text></svg>
    <span class="sep">×</span>
    <svg viewBox="0 0 24 24" width="36" height="36"><rect width="24" height="24" rx="3" fill="#F7DF1E"/><text x="12" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#000">JS</text></svg>
    <h1>JavaScript</h1>
  </div>
  <input id="textInput" value="Every Line Fills The Width" />
  <canvas id="canvas"></canvas>
  <script type="module">
    import { fit } from './node_modules/tightset/dist/index.js'
    import { render } from './node_modules/tightset/dist/canvas.js'

    await document.fonts.ready

    const canvas = document.getElementById('canvas')
    const input = document.getElementById('textInput')
    const opts = { width: 800, height: 400, fontFamily: 'Inter', maxWeight: 900, spread: 150 }

    function redraw() {
      const result = fit(input.value, opts)
      if (result) {
        render(canvas, result, { fontFamily: 'Inter', color: '#ffffff', background: '#0d0d0d', dpr: 2 })
      }
    }

    canvas.width = 1600
    canvas.height = 800
    canvas.style.width = '800px'
    canvas.style.height = '400px'
    redraw()

    input.addEventListener('input', redraw)
  </script>
</body>
</html>
